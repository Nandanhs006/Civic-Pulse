name: Civic Pulse CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-qa:
    name: Backend Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Black formatter check
        run: black --check backend/app backend/tests

      - name: Run Flake8 linter check
        run: flake8 backend/app backend/tests --max-line-length=88

      - name: Run Mypy static type check
        run: mypy backend/app --ignore-missing-imports

      - name: Run Pytest suite
        run: |
          cd backend
          pytest

  frontend-qa:
    name: Frontend Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint check
        run: |
          cd frontend
          npm run lint

      - name: Run TypeScript type-safety checks
        run: |
          cd frontend
          npm run typecheck

      - name: Run Vitest unit tests
        run: |
          cd frontend
          npm run test
