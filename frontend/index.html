<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="theme-favicon" />
    <link rel="apple-touch-icon" href="/logo/logo.png" />
    <meta name="theme-color" content="#FF9933" />
    <script>
      (function(){
        function getInitialTheme(){
          var stored = null;
          try{ stored = localStorage.getItem('theme'); }catch(e){}
          if(stored === 'light' || stored === 'dark') return stored;
          if(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
          return 'dark';
        }

        var favicon = document.getElementById('theme-favicon');
        if(!favicon){
          favicon = document.createElement('link');
          favicon.rel = 'icon';
          favicon.id = 'theme-favicon';
          document.head.appendChild(favicon);
        }

        var lightPath = '/logo/logo.png';
        var darkPath = '/logo/logo_dark.png';


        var setFor = function(theme){
          var target = theme === 'light' ? lightPath : darkPath;
          favicon.href = target;
        };

        // Set initial (async check for files, fallback to embedded SVGs)
        setFor(getInitialTheme());

        // Observe theme changes on the document element
        try{
          var observer = new MutationObserver(function(mutations){
            mutations.forEach(function(m){
              if(m.attributeName === 'data-theme'){
                setFor(document.documentElement.getAttribute('data-theme'));
              }
            });
          });
          observer.observe(document.documentElement, { attributes: true });
        }catch(e){}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civic Pulse - People's Priorities</title>
    
    <!-- Google Fonts Outfit & Inter for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Noto Sans Indic families so Devanagari/Bengali/Tamil/Telugu/etc. render -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Noto+Sans+Telugu:wght@400;500;600;700&family=Noto+Sans+Gujarati:wght@400;500;600;700&family=Noto+Sans+Kannada:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600;700&family=Noto+Sans+Gurmukhi:wght@400;500;600;700&family=Noto+Sans+Oriya:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Leaflet.markercluster CSS for the live map clustering -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
